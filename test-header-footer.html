<!DOCTYPE html>
<html>
<head>
  <style>
    @page { margin-bottom: 20mm; }
    @page no-margin { margin: 0; }
    
    body { margin: 0; font-family: sans-serif; }
    .page { height: 1122px; box-sizing: border-box; border-bottom: 5px solid blue; }
    .cover { page: no-margin; }
    .signature { page: no-margin; }
  </style>
</head>
<body>
  <div class="page cover">Cover Page (Should NOT have footer)</div>
  <div class="page">Content Page 1 (Should have footer)</div>
  <div class="page">Content Page 2 (Should have footer)</div>
  <div class="page signature">Signature Page (Should NOT have footer)</div>
</body>
</html>
